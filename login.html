<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | My Food App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-bg">
    <main class="login-wrapper">
      <section class="login-card">
        <p class="brand-tag">My Food App</p>

        <h1>Welcome!</h1>
        <p class="subtitle">Log in to get your food now.</p>
        <p class="description">Sign in to add food to your cart and checkout.</p>

        <form action="dashboard.html" onsubmit="return checkInfo();" class="login-form" method="post">
          <label for="emailId">Email Address</label>
          <input type="email" id="emailId" placeholder="Enter your email" required />

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />

          <div class="form-actions">
            <input type="submit" value="Login" id="loginBtn" />
            <input type="reset" value="Reset" />
          </div>
        </form>
      </section>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
